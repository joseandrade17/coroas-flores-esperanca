<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Produto – Coroas Floresperança</title>
  <link rel="shortcut icon" href="./imagens/Logo.png" type="image/png"/>
  <link rel="stylesheet" href="./css/style.css"/>
</head>
<body>

<div id="header-placeholder"></div>

<main>
  <div class="product-page">
    <div class="breadcrumb">
      <a id="breadHome" href="#">Início</a>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      <a id="breadCatalog" href="#">Catálogo</a>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      <span id="breadName"></span>
    </div>

    <div id="productContent"></div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="./js/data.js"></script>
<script src="./js/main.js"></script>
<script>
  const SIZE_SCALES = { P: 0.60, M: 0.78, G: 1.0 };
  let selectedSize = 'M';
  let product = null;

  function getProduct() {
    const id = +new URLSearchParams(window.location.search).get('id') || 1;
    return PRODUCTS.find(p => p.id === id) || PRODUCTS[0];
  }

  function renderPage() {
    const base = getBase();
    const p = product;
    const s = SIZES.find(x => x.id === selectedSize) || SIZES[1];
    const total = p.basePrice + s.addon;
    const origTotal = p.originalPrice + s.addon;

    document.title = `${p.name} – Coroas Flores Esperança`;
    document.getElementById('breadName').textContent = p.name;

    const thumbs = SIZES.map(sz => `
      <div class="size-thumb${selectedSize===sz.id?' active':''}" onclick="setSize('${sz.id}')">
        <div style="width:70px;height:70px">${wreathSVG(SIZE_SCALES[sz.id], selectedSize===sz.id)}</div>
        <div class="size-thumb__label">${sz.label}</div>
        <div class="size-thumb__dim">${sz.dimensions}</div>
        <div class="size-thumb__addon">${sz.addon===0?'Sem acréscimo':'+ '+fmtPrice(sz.addon)}</div>
      </div>
    `).join('');

    const compareSVGs = SIZES.map(sz => {
      const h = {P:52,M:68,G:88}[sz.id];
      return `<div class="size-compare__item${selectedSize===sz.id?' active':''}" onclick="setSize('${sz.id}')">
        <div style="width:${h}px;height:${h}px">${wreathSVG(SIZE_SCALES[sz.id], selectedSize===sz.id)}</div>
        <span>${sz.id}</span><small>${sz.dimensions}</small>
      </div>`;
    }).join('');

    const sizeSel = SIZES.map(sz => `
      <div class="product-size-opt${selectedSize===sz.id?' active':''}" onclick="setSize('${sz.id}')">
        <div class="product-size-opt__letter">${sz.id}</div>
        <div class="product-size-opt__dim">${sz.dimensions}</div>
        <div class="product-size-opt__addon">${sz.addon===0?'Sem acréscimo':'+ '+fmtPrice(sz.addon)}</div>
      </div>
    `).join('');

    const features = ["Flores naturais e frescas","Entrega rápida e segura","Faixa de homenagem inclusa","Disponível 24 horas","Montagem artesanal","Apoio ao cliente"];

    document.getElementById('productContent').innerHTML = `
      <div class="product-layout">
      <div>
  <div class="product-img-main">
    <div class="product-img-badges">
      <span class="badge badge--primary">${p.badge}</span>
      <span class="badge badge--red">-${p.discount}% OFF</span>
    </div>
    <img src="${base}${p.image}" alt="${p.name}"/>
  </div>

  <!-- Miniaturas de tamanho -->
  <div class="size-thumbs">${thumbs}</div>

  <!-- Comparação de Tamanhos com fotos reais -->
  <div class="size-compare">
    <h4>Comparação de Tamanhos</h4>
    <div class="size-compare__svgs">
      
      <!-- Pequena -->
      <div class="size-compare__item ${selectedSize === 'P' ? 'active' : ''}" onclick="setSize('P')">
        <img src="imagens/tamanho-p.png" alt="Coroa Pequena">
        <span>P</span>
        <small>1,00m × 1,00m</small>
      </div>

      <!-- Média -->
      <div class="size-compare__item ${selectedSize === 'M' ? 'active' : ''}" onclick="setSize('M')">
        <img src="imagens/tamanho-m.png" alt="Coroa Média">
        <span>M</span>
        <small>1,00m × 1,20m</small>
      </div>

      <!-- Grande -->
      <div class="size-compare__item ${selectedSize === 'G' ? 'active' : ''}" onclick="setSize('G')">
        <img src="imagens/tamanho-g.png" alt="Coroa Grande">
        <span>G</span>
        <small>1,00m × 1,50m</small>
      </div>

    </div>
  </div>
</div>

        <div>
          <div class="product-rating">
            <div class="stars">${renderStars(4.5)}</div>
            <span class="product-rating-text">4.5 <span style="font-weight:400">(83 avaliações)</span></span>
          </div>
          <h1 class="product-name">${p.name}</h1>
          <div class="product-price">
            <span class="product-price__main">${fmtPrice(total)}</span>
            <span class="product-price__old">${fmtPrice(origTotal)}</span>
          </div>

          <div class="product-ribbon-banner">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3z"/></svg>
            <div><strong>Faixa de Homenagem Gratuita</strong><span>Acompanha faixa personalizada sem custo adicional.</span></div>
          </div>

          <div class="product-sizes">
            <div class="product-sizes__header"><h3>Escolha o Tamanho</h3><span>${s.dimensions}</span></div>
            <div class="product-sizes__grid">${sizeSel}</div>
          </div>

          <div class="product-ctas">
            <button class="wapp-btn" onclick="whatsappBuy()">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              Comprar pelo WhatsApp
            </button>
            <a href="${base}pedido.html" class="btn btn--outline btn--full" style="border-radius:var(--radius)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
              Preencher formulário de pedido
            </a>
            <a href="tel:+55${WHATSAPP}" class="btn btn--ghost btn--full" style="font-size:.85rem;color:var(--muted);border-radius:var(--radius)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.948V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 7V5z"/></svg>
              Ligar agora: ${PHONE}
            </a>
          </div>

          <hr class="product-divider"/>

          <div class="product-desc">
            <h3>Descrição do Produto</h3>
            <!-- Aviso de Substituição de Flores -->
            <div style="margin: 1.25rem 0; padding: 1rem 1.25rem; background: #fefce8; border-left: 4px solid #eab308; border-radius: 8px; font-size: 0.87rem; color: #713f12;">
              <strong style="color: #854d0e;">⚠️ Aviso sobre as flores:</strong><br><br>
              Devido à sazonalidade das flores, pode haver substituição de espécies, sempre respeitando a cor escolhida e o padrão do arranjo, com reposição por flores de igual qualidade.
            </div>
            <p>${p.description}</p>
            <p>As flores utilizadas podem variar de acordo com a época do ano, garantindo sempre a melhor qualidade e durabilidade para a homenagem.</p>
            <div class="product-features">
              ${features.map(f => `<div class="product-feature"><div class="product-feature__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>${f}</div>`).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  }

 function setSize(id) { 
   selectedSize = id;
   renderPage(); }
  function whatsappBuy() { const s = SIZES.find(x => x.id === selectedSize) || SIZES[1];
  const total = product.basePrice + s.addon; 
  const text = Olá! Vim pelo site Coroas Floresperança e gostaria de informações. 
  *${product.name}* - Tamanho ${selectedSize} (${s.dimensions}) 
  - ${fmtPrice(total)}. Poderia me ajudar com o pedido?;
  window.open(https://wa.me/${WHATSAPP}?text=${encodeURIComponent(text)}, '_blank'); 
  } document.addEventListener('DOMContentLoaded', () => { 
  const base = getBase();
  document.getElementById('breadHome').href = base + 'index.html';
  document.getElementById('breadCatalog').href = base + '/index.html#catalogo';
  product = getProduct(); renderPage(); });
</script>
</body>
</html>

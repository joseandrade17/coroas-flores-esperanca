<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Produto – Coroas Floresperança</title>
  <link rel="shortcut icon" href="./imagens/Logo.png" type="image/png"/>
  <link rel="stylesheet" href="./css/style.css"/>
</head>
<body>

<div id="header-placeholder"></div>

<main>
  <div class="product-page">
    <div class="breadcrumb">
      <a id="breadHome" href="#">Início</a>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      <a id="breadCatalog" href="#">Catálogo</a>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      <span id="breadName"></span>
    </div>

    <div id="productContent"></div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="./js/data.js"></script>
<script src="./js/main.js"></script>
<script>
let selectedSize = new URLSearchParams(window.location.search).get('size') || 'M';

  function getProduct() {
    const id = +new URLSearchParams(window.location.search).get('id') || 1;
    return PRODUCTS.find(p => p.id === id) || PRODUCTS[0];
  }

  // ==================== FUNÇÕES DE PREÇO ====================
  function getProductPrice(product, sizeId) {
    if (!product?.sizePrices) return product?.basePrice || 0;
    return product.sizePrices[sizeId] || product.basePrice;
  }


  function renderPage() {
    const base = typeof getBase === 'function' ? getBase() : './';
    const p = product;

    // ==================== DETECÇÃO DE PRODUTO NOBRE ====================
    const isNobre = p.name.toLowerCase().includes('nobre') || 
                    (p.category && p.category.toLowerCase().includes('nobre'));

    const total = getProductPrice(p, selectedSize);
   

    document.title = `${p.name} – Coroas Flores Esperança`;
    document.getElementById('breadName').textContent = p.name;

    // Miniaturas de tamanho
    const thumbs = SIZES.map(sz => `
      <div class="size-thumb${selectedSize===sz.id?' active':''}" onclick="setSize('${sz.id}')">
        <div class="size-thumb__label">${sz.label}</div>
      </div>
    `).join('');

    const features = [
      "Flores naturais e frescas",
      "Entrega rápida e segura",
      "Faixa de homenagem inclusa",
      "Disponível 24 horas",
      "Montagem artesanal",
      "Apoio ao cliente"
    ];

    // ==================== DIMENSÕES - APENAS NOBRE MUDA ====================
    let dimP = "1,00m × 1,00m";
    let dimM = "1,20m × 1,00m";
    let dimG = "1,50m × 1,00m";

    if (isNobre) {
      // ←←← ALTERE AQUI AS DIMENSÕES EXCLUSIVAS DA LINHA NOBRE ←←←
      dimP = "1,20m × 1,00m";
      dimM = "1,50m × 1,00m";   // ← Mude aqui o tamanho M da Nobre
      dimG = "1,70m × 1,00m";   // ← Mude aqui o tamanho G da Nobre
    }

    document.getElementById('productContent').innerHTML = `
      <div class="product-layout">
        <div>
          <div class="product-img-main">
            <div class="product-img-badges">
              <span class="badge badge--primary">${p.badge}</span>
            </div>
            <img src="${base}${p.image}" alt="${p.name}"/>
          </div>

          <!-- Miniaturas de tamanho -->
          <div class="size-thumbs">${thumbs}</div>

          <!-- Comparação de Tamanhos -->
          <div class="size-compare">
            <h4>Comparação de Tamanhos</h4>
            <div class="size-compare__svgs">

              <div class="size-compare__item ${selectedSize === 'P' ? 'active' : ''}" onclick="setSize('P')">
                <img src="${isNobre ? 'imagens/nobre-p.jpg' : 'imagens/tamanho-p.png'}" 
                     alt="Coroa Pequena" 
                     style="width: 900px; height: auto;">
                <span>P</span>
                <small>${dimP}</small>
              </div>

              <div class="size-compare__item ${selectedSize === 'M' ? 'active' : ''}" onclick="setSize('M')">
                <img src="${isNobre ? 'imagens/nobre-m.jpg' : 'imagens/tamanho-m.png'}" 
                     alt="Coroa Média" 
                     style="width: 900px; height: auto;">
                <span>M</span>
                <small>${dimM}</small>
              </div>

              <div class="size-compare__item ${selectedSize === 'G' ? 'active' : ''}" onclick="setSize('G')">
                <img src="${isNobre ? 'imagens/nobre-g.jpg' : 'imagens/tamanho-g.jpg'}" 
                     alt="Coroa Grande" 
                     style="width: 900px; height: auto;">
                <span>G</span>
                <small>${dimG}</small>
              </div>

            </div>
          </div>
        </div>

        <div>
          <div class="product-rating">
            <div class="stars">${renderStars ? renderStars(4.5) : '★★★★☆'}</div>
            <span class="product-rating-text">4.5 <span style="font-weight:400">(83 avaliações)</span></span>
          </div>
          <h1 class="product-name">${p.name}</h1>
          
          <div class="product-price">
            <span class="product-price__main">${fmtPrice(total)}</span>
          </div>

          <div class="product-ribbon-banner">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3z"/></svg>
            <div><strong>Faixa de Homenagem Gratuita</strong><span>Acompanha faixa personalizada sem custo adicional.</span></div>
          </div>

          <div class="product-ctas">
            <button class="wapp-btn" onclick="whatsappBuy()">
              Comprar pelo WhatsApp
            </button>
            <a href="${base}pedido.html?id=${p.id}&size=${selectedSize}" class="btn btn--outline btn--full" style="border-radius:var(--radius)">
              Preencher formulário de pedido
            </a>
            <a href="tel:+55${WHATSAPP}" class="btn btn--ghost btn--full" style="font-size:.85rem;color:var(--muted);border-radius:var(--radius)">
              Ligar agora: ${PHONE}
            </a>
          </div>

          <hr class="product-divider"/>

          <div class="product-desc">
            <h3>Descrição do Produto</h3>
            <div style="margin: 1.25rem 0; padding: 1rem 1.25rem; background: #fefce8; border-left: 4px solid #eab308; border-radius: 8px; font-size: 0.87rem; color: #713f12;">
              <strong style="color: #854d0e;">⚠️ Avisos importantes:</strong><br><br>
              📸 <strong>Fotos meramente ilustrativas</strong> — As imagens são representativas. O arranjo final pode variar ligeiramente.<br><br>
              🌸 Devido à sazonalidade das flores, pode haver substituição de espécies, sempre respeitando a cor escolhida e o padrão do arranjo.
            </div>
            
            <p>${p.description}</p>
            <p>As flores utilizadas podem variar de acordo com a época do ano, garantindo sempre a melhor qualidade e durabilidade para a homenagem.</p>
            
            <div class="product-features">
              ${features.map(f => `
                <div class="product-feature">
                  <div class="product-feature__icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                  ${f}
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function setSize(id) { 
    selectedSize = id;
    renderPage();
  }

  function whatsappBuy() {
    const price = getProductPrice(product, selectedSize);
    const text = `Olá! Gostaria de comprar a coroa *${product.name}* no tamanho *${selectedSize}* (${fmtPrice(price)}).`;
    window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(text)}`, '_blank');
  }

  // Inicialização
  document.addEventListener('DOMContentLoaded', () => { 
    const base = typeof getBase === 'function' ? getBase() : './';
    document.getElementById('breadHome').href = base + 'index.html';
    document.getElementById('breadCatalog').href = base + 'index.html#catalogo';
    
    product = getProduct();
    renderPage();
  });
</script>
</body>
</html>

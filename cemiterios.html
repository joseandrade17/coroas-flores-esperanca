<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cemitérios Atendidos – Coroas Floresperança</title>
  <link rel="shortcut icon" href="./imagens/Logo.png" type="image/png"/>
  <link rel="stylesheet" href="./css/style.css"/>
</head>
<body>

<div id="header-placeholder"></div>

<main>
  <div class="cemiterios-page">
    <div class="breadcrumb">
      <a id="breadHome" href="#">Início</a>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      <span>Cemitérios</span>
    </div>

    <h1 style="font-family:var(--font-serif);font-size:2rem;font-weight:800;margin-bottom:.5rem">Cemitérios Atendidos</h1>
    <p style="color:var(--muted);max-width:600px;margin-bottom:2rem;line-height:1.7">
      Entregamos coroas em todos os cemitérios listados abaixo. Clique em um cemitério para ver sua
      localização no mapa e usar no seu pedido.
    </p>

    <!-- Map panel (hidden until selected) -->
    <div class="cem-map-panel hidden" id="mapPanel">
      <div class="cem-map-panel__header">
        <div class="cem-map-panel__info">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <div>
            <strong id="mapName"></strong>
            <small id="mapAddr"></small>
          </div>
        </div>
        <div class="cem-map-panel__actions">
          <button id="mapOrderBtn" class="btn btn--primary btn--sm" style="display:none">Fazer Pedido</button>
          <button onclick="closeMap()" style="background:none;border:none;cursor:pointer;padding:.3rem;color:var(--muted);display:flex">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <iframe class="cem-map-iframe" id="mapIframe" title="Mapa" allowfullscreen loading="lazy"></iframe>
      <div class="cem-map-btns">
        <button id="mapOrderBtn2" class="btn btn--primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          Fazer Pedido para Este Cemitério
        </button>
        <a id="mapGoogleBtn" href="#" target="_blank" rel="noreferrer" class="btn btn--outline">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Abrir no Google Maps
        </a>
      </div>
    </div>

    <div class="search-wrap" style="max-width:400px;margin-left:0;margin-bottom:1.5rem">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="cemSearch" type="text" placeholder="Buscar por nome, bairro ou cidade..."/>
    </div>

    <div class="cem-grid" id="cemGrid"></div>

    <p style="text-align:center;color:var(--muted);font-size:.82rem;margin-top:2rem">
      Não encontrou seu cemitério?
      <a href="https://wa.me/551142126660?text=Ol%C3%A1!%20Vim%20do%20site%20Coroas%20FlorEsperan%C3%A7a%2024h%20e%20gostaria%20de%20mais%20informa%C3%A7%C3%B5es." target="_blank" rel="noreferrer" style="color:var(--primary);font-weight:600">Entre em contato pelo WhatsApp</a>
      e verificamos se atendemos sua região.
    </p>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="./js/data.js"></script>
<script src="./js/main.js"></script>
<script>
  let selectedCem = null;
  let searchQ = '';

  function renderCems() {
    const base = getBase();
    const q = searchQ.toLowerCase();
    const filtered = CEMETERIES.filter(c =>
      c.name.toLowerCase().includes(q) || c.address.toLowerCase().includes(q) || c.city.toLowerCase().includes(q)
    );
    const grid = document.getElementById('cemGrid');
    if (!filtered.length) { grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted)">Nenhum cemitério encontrado.</p>`; return; }
    grid.innerHTML = filtered.map(c => `
      <div class="cem-card${selectedCem===c.id?' selected':''}" data-id="${c.id}">
        <div class="cem-card__top">
          <div class="cem-card__icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
          <div class="cem-card__name">${c.name}</div>
        </div>
        <ul class="cem-card__info">
          <li><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${c.address}, ${c.city}/${c.state}</li>
          ${c.phone ? `<li><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.948V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 7V5z"/></svg>${c.phone}</li>` : ''}
          <li><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${c.hours}</li>
        </ul>
        <div class="cem-card__actions">
          <button class="btn btn--outline btn--sm" onclick="selectCem(${c.id}, event)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Ver no Mapa
          </button>
          <button class="btn btn--primary btn--sm" onclick="orderCem(${c.id}, event)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            Fazer Pedido
          </button>
        </div>
      </div>
    `).join('');
  }

  function cemLabel(c) { return `${c.name} - ${c.address}, ${c.city}/${c.state}`; }

  function selectCem(id, e) {
    if (e) e.stopPropagation();
    const c = CEMETERIES.find(x => x.id === id);
    if (!c) return;
    selectedCem = id;
    document.getElementById('mapName').textContent = c.name;
    document.getElementById('mapAddr').textContent = `${c.address}, ${c.city}/${c.state}`;
    document.getElementById('mapIframe').src = `https://maps.google.com/maps?q=${encodeURIComponent(c.mapQuery)}&output=embed&z=15`;
    const base = getBase();
    const orderUrl = `${base}pedido.html?cemiterio=${encodeURIComponent(cemLabel(c))}`;
    document.getElementById('mapOrderBtn').onclick = () => window.location.href = orderUrl;
    document.getElementById('mapOrderBtn2').onclick = () => window.location.href = orderUrl;
    document.getElementById('mapGoogleBtn').href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.mapQuery)}`;
    document.getElementById('mapPanel').classList.remove('hidden');
    document.getElementById('mapOrderBtn').style.display = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    renderCems();
  }

  function orderCem(id, e) {
    if (e) e.stopPropagation();
    const c = CEMETERIES.find(x => x.id === id);
    if (!c) return;
    window.location.href = getBase() + `pedido.html?cemiterio=${encodeURIComponent(cemLabel(c))}`;
  }

  function closeMap() {
    selectedCem = null;
    document.getElementById('mapPanel').classList.add('hidden');
    document.getElementById('mapIframe').src = '';
    renderCems();
  }

  document.getElementById('cemSearch').addEventListener('input', e => {
    searchQ = e.target.value;
    renderCems();
  });

  document.getElementById('cemGrid').addEventListener('click', e => {
    const card = e.target.closest('.cem-card');
    if (card && !e.target.closest('button')) selectCem(+card.dataset.id);
  });

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('breadHome').href = getBase() + 'index.html';
    renderCems();
  });
</script>
</body>
</html>
